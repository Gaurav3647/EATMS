<div class="container mt-4">

    <h2>Edit User</h2>
  
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="fullName">
    </div>
  
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input
        type="email"
        class="form-control"
        [(ngModel)]="email">
    </div>
  
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        type="password"
        class="form-control"
        [(ngModel)]="password">
    </div>
  
    <div class="mb-3">
      <label class="form-label">Role</label>
  
      <select
        class="form-control"
        [(ngModel)]="role">
  
        <option value="User">User</option>
        <option value="Admin">Admin</option>
  
      </select>
    </div>
  
    <button
      class="btn btn-primary"
      (click)="updateUser()">
      Update User
    </button>
  
  </div>
